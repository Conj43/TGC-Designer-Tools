name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install numpy==1.26.0
          pip install scipy==1.12.0
          pip install opencv-python==4.10.0.84
          pip install Pillow==11.0.0
          pip install matplotlib==3.10.0
          pip install imutils==0.5.2
          pip install overpy==0.7
          pip install pyproj==3.7.0
          pip install requests==2.32.3
          pip install scikit-image==0.25.0
          pip install urllib3==2.3.0
          pip install laspy[lazrs]
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller -F --add-binary="./laszip/laszip-cli.exe;laszip" --additional-hooks-dir="./PyInstaller/hooks/" --hidden-import=cv2 --hidden-import=numpy --hidden-import=scipy --hidden-import=PIL --hidden-import=matplotlib --hidden-import=pyproj --hidden-import=overpy --hidden-import=skimage --hidden-import=imutils --hidden-import=laspy --collect-all=cv2 --collect-all=pyproj tgc_gui.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: tgc-designer-tools
          path: dist/tgc_gui.exe
